---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: health-tracking

---
# Envoy Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: health-gateway
  namespace: health-tracking
spec:
  gatewayClassName: envoy
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    hostname: "health.gitlab.be"

---
# HTTPRoute for API and Frontend routing
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: health-routes
  namespace: health-tracking
spec:
  parentRefs:
  - name: health-gateway
    port: 80
  
  rules:
  # API routes - forward /api/* to backend service
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: backend-service
      port: 5000
      weight: 100
    # Optional: add request/response filters here
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /
  
  # Frontend catch-all - forward everything else to frontend service
  - backendRefs:
    - name: frontend-service
      port: 3000
      weight: 100
