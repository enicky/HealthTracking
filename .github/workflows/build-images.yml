name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display directory structure
        run: |
          echo "=== Repository Root ===" 
          ls -la
          echo ""
          echo "=== Backend Directory ===" 
          ls -laR Backend/ | head -50
          echo ""
          echo "=== Backend Dockerfile Check ===" 
          if [ -f Backend/Dockerfile ]; then
            echo "✓ Backend/Dockerfile EXISTS"
            file Backend/Dockerfile
            echo "First 10 lines:"
            head -10 Backend/Dockerfile
          else
            echo "✗ Backend/Dockerfile NOT FOUND"
            echo "Files in Backend/:"
            find Backend/ -maxdepth 1 -type f
          fi
          echo ""
          echo "=== Frontend Directory ===" 
          ls -laR Frontend/ | head -50
          echo ""
          echo "=== Frontend Dockerfile Check ===" 
          if [ -f Frontend/Dockerfile ]; then
            echo "✓ Frontend/Dockerfile EXISTS"
            file Frontend/Dockerfile
            echo "First 10 lines:"
            head -10 Frontend/Dockerfile
          else
            echo "✗ Frontend/Dockerfile NOT FOUND"
            echo "Files in Frontend/:"
            find Frontend/ -maxdepth 1 -type f
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug build context
        run: |
          echo "=== Backend Build Context Check ===" 
          echo "Context: Backend"
          echo "File: Dockerfile"
          echo "Expected path: Backend/Dockerfile"
          echo "Actual check:"
          [ -f Backend/Dockerfile ] && echo "✓ File exists" || echo "✗ File missing"
          pwd
          echo ""
          echo "=== Frontend Build Context Check ===" 
          echo "Context: Frontend"
          echo "File: Dockerfile"
          echo "Expected path: Frontend/Dockerfile"
          echo "Actual check:"
          [ -f Frontend/Dockerfile ] && echo "✓ File exists" || echo "✗ File missing"

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/health-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/health-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Backend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Frontend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-and-push
    permissions:
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/health-api:latest
          format: 'sarif'
          output: 'trivy-results.json'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.json'
          category: 'trivy'
